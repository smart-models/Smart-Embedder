# Compose override: disables GPU access for CPU execution.
# Usage: docker compose -f docker-compose.gpu.yml -f docker-compose.cpu.yml up -d
#
# `!reset` is a Compose Spec tag (v2.24+) that removes this key during merge.
# Generic YAML linters may report it as an "unresolved tag"; that warning is
# cosmetic, and Docker Compose parses it correctly.
services:
  embedder:
    build:
      # Slim CPU image instead of the nvidia/cuda base; ~2.5 GB smaller.
      dockerfile: Dockerfile.cpu
    # Distinct tag + container name so CPU build never overwrites or collides with GPU.
    image: smart-embedder:cpu
    container_name: smart-embedder-cpu
    environment:
      CUDA_VISIBLE_DEVICES: "-1"
    deploy:
      resources:
        reservations:
          devices: !reset []
